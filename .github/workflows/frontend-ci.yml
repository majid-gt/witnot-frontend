name: Frontend CI

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: dockermajid/witnot-frontend

jobs:
  build-push-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout frontend repo
        uses: actions/checkout@v4

      - name: Set SHA
        run: echo "SHA_SHORT=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:${{ env.SHA_SHORT }} .

      - name: Push Image
        run: |
          docker push ${{ env.IMAGE_NAME }}:${{ env.SHA_SHORT }}

      - name: Checkout deployment repo
        uses: actions/checkout@v4
        with:
          repository: majid-gt/witnot-deployment
          token: ${{ secrets.GH_PAT }}
          path: deployment

      - name: Update image tag
        run: |
          sed -i "s|${{ env.IMAGE_NAME }}:.*|${{ env.IMAGE_NAME }}:${{ env.SHA_SHORT }}|g" deployment/k8s/frontend-deployment.yaml

      - name: Commit and push
        run: |
          cd deployment
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Update frontend image to ${{ env.SHA_SHORT }}"
          git push
